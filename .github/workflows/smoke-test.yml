name: Smoke Test

on:
  push:
    branches: [master, ci/smoke-tests]
  pull_request:
    branches: [master]

jobs:
  demo-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: pip install pytest
      - name: Unit tests (mimir backend stubbed at the _mcp_send seam)
        run: python -m pytest tests/ -v
